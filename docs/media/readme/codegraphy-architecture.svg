<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
<title id="title">CodeGraphy architecture and logic flow</title>
<desc id="desc">Workspace files, repo settings, and Git history flow into CodeGraphy. Discovery and indexing run Tree-sitter and plugins, write relationship evidence into the Graph Cache, project it into the Visible Graph, and expose it through the VS Code webview, exports, and CodeGraphy MCP.</desc>
