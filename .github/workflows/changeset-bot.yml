name: Changeset Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changeset-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changesets
        run: |
          # Find changeset markdown files (excluding README.md)
          CHANGESETS=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null)
          if [ -z "$CHANGESETS" ]; then
            echo "::warning::No changeset found. If this PR includes user-facing changes, run 'pnpm changeset' to add one."
          else
            echo "Changesets found:"
            echo "$CHANGESETS"
          fi
